// --- Mobile viewport sizing ---
// Use VisualViewport when available so fixed-position UI stays visible when the
// browser UI / on-screen keyboard changes the visual viewport size.
var baseInnerHeight = Math.max(window.innerHeight, document.documentElement.clientHeight || 0);

function updateKeyboardRaise(vvBottom) {
    var root = document.documentElement;
    var active = document.activeElement;
    var isNarrow = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
    if (!isNarrow || !active || active.id !== 'game-input') {
        root.style.setProperty('--kb-raise', '0px');
        return;
    }

    var bar = document.getElementById('history-bar');
    if (bar) {
        // Try to raise only as much as needed to keep the bar inside the visual viewport.
        var vv = window.visualViewport;
        // getBoundingClientRect() is in *visual* viewport coordinates, so compare
        // against visualViewport.height (not height+offsetTop).
        var visibleBottom = vv ? vv.height : window.innerHeight;
        var currentRaise = parseFloat(getComputedStyle(root).getPropertyValue('--kb-raise')) || 0;
        var rect = bar.getBoundingClientRect();

        // Removing kb-raise would move the bar DOWN by currentRaise.
        var baselineBottom = rect.bottom + currentRaise;
        // Prefer a bigger gap above the keyboard so the bar isn't glued to it.
        // Using ~half the bar height gives a consistent feel across devices.
        var margin = Math.max(20, Math.round(20 + rect.height * 0.5));
        var needed = Math.max(0, Math.ceil(baselineBottom - (visibleBottom - margin)));

        if (needed > 0) {
            var maxRaise = Math.round(Math.min(baseInnerHeight * 0.45, 420));
            root.style.setProperty('--kb-raise', Math.min(maxRaise, needed) + 'px');
            return;
        }
    }

    // Fallback for overlay keyboards that don't update visualViewport metrics.
    var currentH = Math.max(window.innerHeight, document.documentElement.clientHeight || 0);
    var innerDelta = Math.max(0, baseInnerHeight - currentH);
    if (!window.visualViewport && vvBottom < 1 && innerDelta < 240) {
        var fallbackRaise = Math.round(Math.min(baseInnerHeight * 0.45, 420));
        root.style.setProperty('--kb-raise', fallbackRaise + 'px');
        return;
    }

    root.style.setProperty('--kb-raise', '0px');
}

function updateViewportVars() {
    var vv = window.visualViewport;
    var height = vv ? vv.height : window.innerHeight;
    var bottomInset = 0;
    if (vv) {
        // Use layout viewport height as the reference so this works with overlay
        // keyboards (where window.innerHeight may match vv.height).
        var layoutH = Math.max(window.innerHeight, document.documentElement.clientHeight || 0);
        bottomInset = Math.max(0, layoutH - (vv.height + vv.offsetTop));
    }
    // Keep a "max" baseline so we can infer keyboard overlays on browsers that
    // don't resize the viewport when the keyboard appears.
    var active = document.activeElement;
    if (!active || active.id !== 'game-input') {
        var currentH = Math.max(window.innerHeight, document.documentElement.clientHeight || 0);
        baseInnerHeight = Math.max(baseInnerHeight, currentH);
    }
    var root = document.documentElement;
    root.style.setProperty('--app-height', height + 'px');
    root.style.setProperty('--vv-bottom', bottomInset + 'px');
    updateKeyboardRaise(bottomInset);
}

function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
    }
    return arr;
}

function toggleGameMode() {
    gameMode = !gameMode;
    var gameUI = document.getElementById('game-ui');
    var gameInput = document.getElementById('game-input');
    if (gameMode) {
        buildKeyboard();
        startNewGameRound();
        gameUI.style.display = 'block';
        // Focus input to capture keyboard input
        setTimeout(function() {
            gameInput.focus();
        }, 100);
    } else {
        gameUI.style.display = 'none';
        clearNudgeTimer();
        clearKeyboardShowTimer();
        gameInput.value = '';
        // Restore normal main text
        var mainText = document.getElementById('main-text');
        mainText.textContent = 'a';
        mainText.style.fontSize = '';
        mainText.style.color = 'white';
    }
    updateModeButton();
}

function updateModeButton() {
    var btn = document.getElementById('mode-btn');
    if (gameMode) {
        btn.classList.add('active');
        btn.title = 'In Game Mode - click for Normal Keyboard Mode';
        btn.textContent = '⌨️';
    } else {
        btn.classList.remove('active');
        btn.title = 'In Normal Mode - click for Word Game';
        btn.textContent = '🕹️';
    }
}

// --- Nudge timer: varied hints to remind the player ---
function resetNudgeTimer() {
    clearNudgeTimer();
    nudgeCount = 0;
    scheduleNextNudge();
}

function scheduleNextNudge() {
    if (!gameMode || !gameWordList.length) return;
    var entry = gameWordList[gameWordIndex];
    if (!entry || gameTypedCount >= entry.word.length) return;
    
    nudgeTimer = setTimeout(function() {
        if (!gameMode || !gameWordList.length) return;
        var entry = gameWordList[gameWordIndex];
        if (!entry || gameTypedCount >= entry.word.length) return;
        
        var expectedLetter = entry.word[gameTypedCount];
        var keyEl = document.getElementById('kb-' + expectedLetter.toLowerCase());
        var type = nudgeCount % 4;
        nudgeCount++;

        if (type === 0) {
            // Nudge 1: grow the current game letter big
            nudgeGrowLetter();
        } else if (type === 1) {
            // Nudge 2: wiggle the keyboard key
            if (keyEl) {
                keyEl.classList.remove('wiggle');
                void keyEl.offsetWidth;
                keyEl.classList.add('wiggle');
            }
        } else if (type === 2) {
            // Nudge 3: flash the keyboard key a different color
            nudgeFlashKey(keyEl);
        } else {
            // Nudge 4: fireworks animation at center
            var centerX = window.innerWidth / 2;
            var centerY = window.innerHeight / 2;
            spawnFirework(centerX, centerY);
        }

        // Schedule next nudge
        scheduleNextNudge();
    }, nudgeDelay);
}

// Grow the current game letter temporarily
function nudgeGrowLetter() {
    var letters = document.querySelectorAll('.game-letter.current');
    for (var i = 0; i < letters.length; i++) {
        letters[i].classList.add('nudge-grow');
        (function(el) {
            setTimeout(function() { el.classList.remove('nudge-grow'); }, 1000);
        })(letters[i]);
    }
}

// Flash the keyboard key with a fun color
function nudgeFlashKey(keyEl) {
    if (!keyEl) return;
    keyEl.classList.add('nudge-flash');
    setTimeout(function() { keyEl.classList.remove('nudge-flash'); }, 1200);
}

function clearNudgeTimer() {
    if (nudgeTimer) {
        clearTimeout(nudgeTimer);
        nudgeTimer = null;
    }
}

function clearKeyboardShowTimer() {
    if (keyboardShowTimer) {
        clearTimeout(keyboardShowTimer);
        keyboardShowTimer = null;
    }
}

function bindGameInput() {
    var gameInput = document.getElementById('game-input');
    if (!gameInput || gameInput.dataset.bound === '1') return;
    gameInput.dataset.bound = '1';

    gameInput.addEventListener('input', function() {
        var value = gameInput.value;
        if (!value) return;
        // Process all typed characters (covers paste / autocomplete).
        for (var i = 0; i < value.length; i++) {
            doCoolStuff({ key: value[i] });
        }
        gameInput.value = '';
    });

    gameInput.addEventListener('focus', function() {
        // Run a few times to catch any delayed viewport updates / keyboard overlays.
        document.documentElement.style.setProperty('--kb-raise', '0px');
        setTimeout(updateViewportVars, 50);
        setTimeout(updateViewportVars, 250);
        setTimeout(updateViewportVars, 450);
    });

    // Keep input focused during game (so soft keyboard stays open).
    gameInput.addEventListener('blur', function() {
        document.documentElement.style.setProperty('--kb-raise', '0px');
        if (gameMode) {
            setTimeout(function() {
                gameInput.focus();
            }, 50);
        }
    });
}

document.addEventListener('DOMContentLoaded', bindGameInput);

// --- On-screen keyboard for game mode ---
function buildKeyboard() {
    var kb = document.getElementById('game-keyboard');
    kb.innerHTML = '';
    for (var r = 0; r < kbRows.length; r++) {
        var rowDiv = document.createElement('div');
        rowDiv.className = 'kb-row';
        for (var k = 0; k < kbRows[r].length; k++) {
            var key = document.createElement('div');
            key.className = 'kb-key';
            key.id = 'kb-' + kbRows[r][k];
            key.textContent = kbRows[r][k].toUpperCase();
            rowDiv.appendChild(key);
        }
        kb.appendChild(rowDiv);
    }
}

function highlightKey(letter) {
    // Clear all highlights
    var allKeys = document.querySelectorAll('.kb-key');
    for (var i = 0; i < allKeys.length; i++) {
        allKeys[i].classList.remove('kb-active');
        allKeys[i].classList.remove('wiggle');
    }
    if (!letter) return;
    var keyEl = document.getElementById('kb-' + letter.toLowerCase());
    if (keyEl) {
        keyEl.classList.add('kb-active');
    }
}

function startNewGameRound() {
    var words = gameWords[currentLang] || gameWords['en'];
    gameWordList = shuffleArray(words.slice());
    gameWordIndex = 0;
    gameTypedCount = 0;
    showCurrentGameWord();
}

function showCurrentGameWord() {
    if (gameWordIndex >= gameWordList.length) {
        // All words done, reshuffle
        gameWordIndex = 0;
        gameWordList = shuffleArray(gameWordList);
    }
    gameTypedCount = 0;
    var entry = gameWordList[gameWordIndex];
    renderGameWord(entry.word, 0);
    // Show hint emoji small
    var hintEl = document.getElementById('game-hint');
    hintEl.textContent = entry.emoji;
    hintEl.style.opacity = '0.6';
    // Reset wrong key counter for new word
    wrongKeyCount = 0;
    // Hide keyboard initially
    var kbd = document.getElementById('game-keyboard');
    kbd.style.opacity = '0';
    // Schedule keyboard to appear after 5 seconds
    clearKeyboardShowTimer();
    keyboardShowTimer = setTimeout(function() {
        if (!gameMode) return;
        kbd.style.opacity = '1';
        // Highlight first letter on keyboard after it's visible
        highlightKey(entry.word[0]);
    }, 5000);
    // Speak the full word
    speakWord(entry.word);
    // Start nudge timer
    resetNudgeTimer();
}

function speakWord(word) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        var lang = languages[currentLang];
        setTimeout(function() {
            doSpeak(word, lang.code);
        }, 50);
    }
}

function renderGameWord(word, typedCount) {
    var container = document.getElementById('game-word');
    container.innerHTML = '';
    for (var i = 0; i < word.length; i++) {
        var span = document.createElement('span');
        span.className = 'game-letter';
        span.textContent = word[i].toUpperCase();
        if (i < typedCount) {
            span.classList.add('typed');
        } else if (i === typedCount) {
            span.classList.add('current');
        }
        container.appendChild(span);
    }
}

function handleGameKey(key) {
    var entry = gameWordList[gameWordIndex];
    var expectedLetter = entry.word[gameTypedCount];
    if (key.toLowerCase() === expectedLetter.toLowerCase()) {
        gameTypedCount++;
        renderGameWord(entry.word, gameTypedCount);
        // Hide keyboard when correct key pressed
        var kbd = document.getElementById('game-keyboard');
        kbd.style.opacity = '0';
        clearKeyboardShowTimer();
        // Speak the letter
        speakLetter(key);
        if (gameTypedCount >= entry.word.length) {
            // Word complete! Show emoji reward with sound
            clearNudgeTimer();
            highlightKey(null);
            showEmojiReward(entry.emoji, entry.word, entry.sound);
        } else {
            // Show temporary emoji feedback for correct letter, then clear it
            showTemporaryEmoji(entry.emoji);
            
            // Schedule keyboard to appear again after 5 seconds for next letter
            keyboardShowTimer = setTimeout(function() {
                if (!gameMode) return;
                var currentEntry = gameWordList[gameWordIndex];
                if (!currentEntry || gameTypedCount >= currentEntry.word.length) return;
                kbd.style.opacity = '1';
                highlightKey(currentEntry.word[gameTypedCount]);
            }, 5000);
            // Highlight next letter on keyboard
            highlightKey(entry.word[gameTypedCount]);
            resetNudgeTimer();
        }
        return true; // correct key
    }
    // Wrong key pressed - increment counter
    wrongKeyCount++;
    // Show keyboard after 3 wrong attempts as a hint
    if (wrongKeyCount >= 3) {
        var kbd = document.getElementById('game-keyboard');
        kbd.style.opacity = '1';
        highlightKey(expectedLetter);
        clearKeyboardShowTimer();
    }
    return false; // wrong key, ignore
}

function skipWord() {
    if (!gameMode || !gameWordList.length) return;
    clearNudgeTimer();
    clearKeyboardShowTimer();
    gameWordIndex++;
    showCurrentGameWord();
}

function showEmojiReward(emoji, word, sound) {
    var mainText = document.getElementById('main-text');
    mainText.textContent = emoji;
    mainText.style.fontSize = '40vmin';
    mainText.classList.remove('bounce');
    void mainText.offsetWidth;
    mainText.classList.add('bounce');

    // Create flying emoji particles
    createEmojiParticles(emoji);
    createScreenFlash();
    createCenterRipple();

    // Speak the word first, then the animal/object sound after
    speakWord(word);

var pianoCtx = null;
var pianoNotes = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25,698.46,783.99];
var funEmojis = ['🌟','🎉','🦄','🌈','🎶','💫','🍬','🎈','🧸','🦋','🐣','🍭','🎵','✨','🌸','🍩','🫧','🪅','💖','🎀'];

function playPianoNote() {
    if (!pianoCtx) {
        try { pianoCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
    }
    if (pianoCtx.state === 'suspended') pianoCtx.resume();
    var freq = pianoNotes[Math.floor(Math.random() * pianoNotes.length)];
    var osc = pianoCtx.createOscillator();
    var gain = pianoCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, pianoCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, pianoCtx.currentTime + 0.6);
    osc.connect(gain);
    gain.connect(pianoCtx.destination);
    osc.start();
    osc.stop(pianoCtx.currentTime + 0.6);
}

// --- Nudge System (encouragement hints during gameplay) ---
function resetNudgeTimer() {
    clearNudgeTimer();
    nudgeCount = 0;
    nudgeTimer = setInterval(function() {
        if (!gameMode) {
            clearNudgeTimer();
            return;
        }
        var entry = gameWordList[gameWordIndex];
        var currentLetter = document.querySelector('.game-letter.current');
        var currentKey = document.querySelector('.kb-key.kb-active');
        
        // Cycle through 4 nudge types
        switch(nudgeCount) {
            case 0: // Grow the current letter
                if (currentLetter) {
                    currentLetter.classList.remove('nudge-grow');
                    void currentLetter.offsetWidth; // Trigger reflow
                    currentLetter.classList.add('nudge-grow');
                }
                break;
            case 1: // Wiggle the keyboard key
                if (currentKey) {
                    currentKey.classList.remove('wiggle');
                    void currentKey.offsetWidth;
                    currentKey.classList.add('wiggle');
                }
                break;
            case 2: // Flash the keyboard key with colors
                if (currentKey) {
                    currentKey.classList.remove('nudge-flash');
                    void currentKey.offsetWidth;
                    currentKey.classList.add('nudge-flash');
                }
                break;
            case 3: // Fireworks at center
                spawnFirework(window.innerWidth / 2, window.innerHeight / 2);
                break;
        }
        nudgeCount = (nudgeCount + 1) % 4;
    }, nudgeDelay);
}

function clearNudgeTimer() {
    if (nudgeTimer) {
        clearInterval(nudgeTimer);
        nudgeTimer = null;
    }
    // Remove any active nudge animations
    var letters = document.querySelectorAll('.game-letter.nudge-grow');
    for (var i = 0; i < letters.length; i++) {
        letters[i].classList.remove('nudge-grow');
    }
    var keys = document.querySelectorAll('.kb-key.wiggle, .kb-key.nudge-flash');
    for (var i = 0; i < keys.length; i++) {

}

// --- Fullscreen ---
function goFullscreen() {
    var el = document.documentElement;
    var promise;
    if (el.requestFullscreen) { promise = el.requestFullscreen(); }
    else if (el.webkitRequestFullscreen) { promise = el.webkitRequestFullscreen(); }
    else if (el.msRequestFullscreen) { promise = el.msRequestFullscreen(); }
    // Lock Escape key in fullscreen (Chrome/Edge)
    if (promise && navigator.keyboard && navigator.keyboard.lock) {
        promise.then(function() {
            navigator.keyboard.lock(['Escape']);
        }).catch(function() {});
    }
}

function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}

function updateControlsVisibility() {
    var controls = document.getElementById('controls');
    if (controls) {
        controls.style.display = isFullscreen() ? 'none' : 'flex';

}

// --- Speech ---
function findVoice(langCode) {
    var voices = window.speechSynthesis.getVoices();
    var langPrefix = langCode.split('-')[0];
    for (var v = 0; v < voices.length; v++) {
        if (voices[v].lang.indexOf(langPrefix) === 0) {
            return voices[v];
        }
    }
    return null;
}

function doSpeak(text, langCode) {
    var utterance = new SpeechSynthesisUtterance();
    utterance.text = text;
    utterance.lang = langCode;
    utterance.rate = 0.7;
    utterance.volume = 1.0;
    utterance.pitch = 1.0;

    var voice = findVoice(langCode);
    if (voice) utterance.voice = voice;

    window.speechSynthesis.speak(utterance);
}

function speakLetter(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        var lang = languages[currentLang];
        var key = text.toLowerCase();

        // Speak the letter or word as-is
        var toSpeak = lang.pronunciation[key] || text;

        setTimeout(function() {
            doSpeak(toSpeak, lang.code);
        }, 50);
    }
}

// --- Core display function ---
function doCoolStuff(event) {
    var textToDisplay = event.key;
    if(textToDisplay == " ") { textToDisplay = "space"; }
    if(textToDisplay == "Alt") { textToDisplay = "alt"; }
    if(textToDisplay == "AltGraph") { textToDisplay = "alt"; }
    if(textToDisplay == "Control") { textToDisplay = "ctrl"; }
    if(textToDisplay == "Meta") { textToDisplay = "win"; }
    if(textToDisplay == "OS") { textToDisplay = "win"; }

    showFloatingEmoji();

    // Game mode: check if the pressed key matches the expected letter
    if (gameMode && textToDisplay.length === 1) {
        var correct = handleGameKey(textToDisplay);
        if (!correct) {
            playPianoNote();
            // Wrong key — shake the game word display
            var gameWord = document.getElementById('game-word');
            gameWord.classList.remove('shake');
            void gameWord.offsetWidth;
            gameWord.classList.add('shake');
        }
        updateHistory(textToDisplay);
        return;
    }

    // In game mode, ignore special keys for gameplay, but still show them in history.
    if (gameMode) {
        if (textToDisplay === 'ctrl' || textToDisplay === 'alt' || textToDisplay === 'win' || textToDisplay === 'space') {
            updateHistory(textToDisplay);
        }
        return;
    }

    playPianoNote();

    var mainText = document.getElementById("main-text");
    mainText.textContent = textToDisplay;

    // Auto-shrink long words so they fit on screen
    if (textToDisplay.length > 3) {
        mainText.style.fontSize = '18vmin';
    } else if (textToDisplay.length > 1) {
        mainText.style.fontSize = '28vmin';
    } else {
        mainText.style.fontSize = '';
    }

    // Pastel color for the main letter
    var letterColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
    mainText.style.color = letterColor;

    // Translate mouse button names to the current language
    var displayText = textToDisplay;
    if (textToDisplay === 'left' || textToDisplay === 'right' || textToDisplay === 'scroll') {
        var lang = languages[currentLang];
        displayText = lang.pronunciation[textToDisplay] || textToDisplay;
    }
    mainText.textContent = displayText;

    // Trigger bounce animation
    mainText.classList.remove('bounce');
    void mainText.offsetWidth; // force reflow
    mainText.classList.add('bounce');

    // Letter particle effects
    createLetterParticles(textToDisplay, letterColor);
    createScreenFlash();
    createCenterRipple();

    speakLetter(textToDisplay);
    updateHistory(textToDisplay);

    return;
}

// Keyboard
document.addEventListener("keypress", function onEvent(event) {
    if (event.target && (event.target.id === 'game-input' || (event.target.closest && event.target.closest('#game-input')))) {
        return;
    }
    event.preventDefault();
    event.stopPropagation();
    doCoolStuff(event);
});

document.addEventListener('pointerdown', function(event) {
    if (event.target.closest && (event.target.closest('#controls') || event.target.closest('#game-input') || event.target.closest('#skip-btn'))) return;
    if (!isFullscreen()) {
        goFullscreen();
    }
    if (gameMode) {
        var gameInput = document.getElementById('game-input');
        if (gameInput) gameInput.focus();
    }
});

// Mouse clicks — different effect per button
document.addEventListener("mousedown", function onEvent(event) {
    if (event.target.closest && (event.target.closest('#controls') || event.target.closest('#game-input'))) return;
    switch (event.button) {
        case 0: spawnConfettiBurst(event.clientX, event.clientY); break;
        case 1: spawnSpiralBurst(event.clientX, event.clientY); break;
        case 2: spawnFirework(event.clientX, event.clientY); break;
        default: spawnConfettiBurst(event.clientX, event.clientY); break;
    }
});
document.addEventListener("mouseup", function onEvent(event) {
    if (event.target.closest && (event.target.closest('#controls') || event.target.closest('#game-input'))) return;
    event.preventDefault();
    event.stopPropagation();
    switch (event.button) {
        case 0: event.key = "left"; break;
        case 1: event.key = "scroll"; break;
        case 2: event.key = "right"; break;
        default: event.key = "??"; break;
    }
    doCoolStuff(event);
});

// Touch taps — show burst on mobile
document.addEventListener("touchstart", function onEvent(event) {
    if (event.target.closest && (event.target.closest('#controls') || event.target.closest('#game-input'))) return;
    var touch = event.touches[0];
    if (touch) {
        spawnBurst(touch.clientX, touch.clientY);
    }
}, { passive: true });

// Right-click prevention
document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
    event.stopPropagation();
    return false;
}, false);

// Block Escape, F11 only when in fullscreen
document.onkeydown = function(event) {
    if (isFullscreen()) {
        if (event.key === "Escape" || event.keyCode === 27) {
            event.preventDefault();
            event.stopPropagation();
            setTimeout(goFullscreen, 100);
            return false;
        }
        if (event.key === "F11" || event.keyCode === 122) {
            event.preventDefault();
            event.stopPropagation();
            return false;
        }
    }
    if (event.altKey || event.ctrlKey || event.metaKey) {

#skip-btn:hover { background: rgba(255,255,255,0.3); }
#skip-btn:active { transform: translateY(-50%) scale(0.85); }

#mode-btn.active {
    background: rgba(255,255,255,0.35);
    box-shadow: 0 0 0 2px rgba(255,255,255,0.5);
}

#game-input {
    display: block;
    position: relative;
    width: 100%;
    min-height: calc(8vmin + 28px);
    padding: 12px 20px;
    font-size: 16px; /* prevent iOS zoom */
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    color: rgba(255, 255, 255, 0);
    caret-color: rgba(255, 255, 255, 0.85);
    text-align: center;
    z-index: 1;
    box-sizing: border-box;
    outline: none;
    pointer-events: auto;
    cursor: text;
    touch-action: manipulation;
    -webkit-appearance: none;
    appearance: none;
    -webkit-user-select: text;
    user-select: text;
}

#history-bar:focus-within #game-input {
    border-color: rgba(255, 255, 255, 0.65);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.22), 0 0 0 3px rgba(255, 255, 255, 0.18);
}

/* Mobile adjustments */
@media (max-width: 768px) {
    #controls {
        top: calc(12px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        bottom: auto;
        left: auto;
        padding: 6px 8px;
        gap: 5px;
    }
    #game-ui {
        /* Keep room for the top-right controls bar. */
        top: max(64px, 10vh);
    }
    #main span#main-text {
        font-size: 30vmin;
    }
    .history-letter {
        font-size: 6vmin;
        min-width: 6vmin;
    }
    #history-bar {
        bottom: calc(10px + env(safe-area-inset-bottom) + var(--vv-bottom) + var(--kb-raise));
    }
    #history {
        gap: 6px;
        padding: 10px 15px;
    }
    #game-input {
        min-height: calc(7vmin + 24px);
        padding: 10px 15px;
    }
    .game-letter {
        font-size: 8vmin;
        gap: 8px;
    }
    #game-hint {
        font-size: 10vmin;
    }
    .kb-key {
        width: 8vmin;
        height: 8vmin;
        font-size: 3.5vmin;
        border-radius: 8px;
    }
}

@media (max-width: 480px) {
    #main span#main-text {
        font-size: 25vmin;
    }
    .history-letter {
        font-size: 5vmin;
        min-width: 5vmin;
    }
    #history {
        gap: 4px;
    }
    #game-input {
        min-height: calc(6vmin + 22px);
    }
    .game-letter {
        font-size: 7vmin;
    }
    #game-hint {
        font-size: 10vmin;
    }
    .kb-key {
        width: 9vmin;
        height: 9vmin;
        min-width: 26px;
        min-height: 26px;
        font-size: 3.5vmin;
        border-radius: 7px;
        gap: 3px;
    }
    .kb-row {
        gap: 3px;
    }
    #game-keyboard {
        gap: 4px;
    }
}
</style>
</head>
<body>
    <div id="rainbow-bg"></div>
    <div id="main">
        <span id="main-text">a</span>
    </div>

    <!-- History bar (bottom center) showing last 10 typed letters -->
    <div id="history-bar">
        <input id="game-input" type="text" inputmode="text" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Typing input">
        <div id="history" aria-hidden="true"></div>
    </div>

    <!-- Game mode UI (shown above center when game is active) -->
    <div id="game-ui" style="display:none;">
        <div id="game-hint"></div>
        <div id="game-word"></div>
        <button id="skip-btn" onclick="skipWord()">&#x23ED;</button>
        <div id="game-keyboard"></div>
    </div>

    <!-- Controls: language + fullscreen — only visible when NOT fullscreen -->
    <div id="controls">
        <button class="lang-btn" data-lang="nl" onclick="setLanguage('nl')" title="Nederlands">
            <svg viewBox="0 0 36 24" width="20" height="20" fill="none" preserveAspectRatio="xMidYMid meet">
                <rect width="36" height="8" fill="#AE1C28"/>
                <rect y="8" width="36" height="8" fill="#FFF"/>
                <rect y="16" width="36" height="8" fill="#33A1FD"/>
            </svg>
        </button>
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">
            <svg viewBox="0 0 60 30" width="20" height="20" fill="none" preserveAspectRatio="xMidYMid meet">
                <clipPath id="s"><path d="M0,0 v30 h60 v-30 z"/></clipPath>
                <clipPath id="t"><path d="M30,15 h30 v15 z v-15 h-30 z h-30 v-15 z v15 h30 z"/></clipPath>
                <path d="M0,0 v30 h60 v-30 z" fill="#012169"/>
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#c8102e" stroke-width="4" clip-path="url(#t)"/>
                <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
                <path d="M30,0 v30 M0,15 h60" stroke="#c8102e" stroke-width="6"/>
            </svg>
        </button>
        <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">
            <svg viewBox="0 0 5 3" width="20" height="20" fill="none" preserveAspectRatio="xMidYMid meet">
                <rect width="5" height="1" fill="#000"/>
                <rect y="1" width="5" height="1" fill="#D00"/>
                <rect y="2" width="5" height="1" fill="#FFCE00"/>
            </svg>
        </button>
        <button class="lang-btn" data-lang="fr" onclick="setLanguage('fr')" title="Français">
            <svg viewBox="0 0 3 2" width="20" height="20" fill="none" preserveAspectRatio="xMidYMid meet">
                <rect width="1" height="2" fill="#002395"/>
                <rect x="1" width="1" height="2" fill="#FFF"/>
                <rect x="2" width="1" height="2" fill="#ED2939"/>
            </svg>
        </button>
        <button class="lang-btn" data-lang="es" onclick="setLanguage('es')" title="Español">
            <svg viewBox="0 0 3 2" width="20" height="20" fill="none" preserveAspectRatio="xMidYMid meet">
                <rect width="3" height="0.5" fill="#C60B1E"/>
                <rect y="0.5" width="3" height="1" fill="#FFC400"/>
                <rect y="1.5" width="3" height="0.5" fill="#C60B1E"/>
            </svg>
        </button>
        <span class="controls-sep"></span>
        <button id="mode-btn" onclick="toggleGameMode()" title="Mode">⌨️</button>
        <span class="controls-sep"></span>
        <button id="fs-btn" onclick="goFullscreen()" title="Fullscreen">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <polyline points="21 3 14 10"></polyline>
                <polyline points="3 21 10 14"></polyline>
            </svg>
        </button>
    </div>
</body>
</html>
